name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep cycle
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          echo "Pinging https://supermart-api.onrender.com/api/ping..."
          curl -s https://supermart-api.onrender.com/api/ping
          echo -e "\nPing complete!"
